<div class="dashboard-container">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
    <h1 style="color: var(--spider-red); font-weight: 800; font-size: 2rem;">PKPMusic</h1>
  </div>
  
  <div *ngIf="sections.length === 0" style="color: var(--text-secondary); text-align: center; margin-top: 50px;">
    Loading your dashboard...
  </div>

  <div *ngFor="let section of sections" class="section">
    <h2 class="section-title">{{ section.title }}</h2>
    <div class="items-scroll">
      <div *ngFor="let item of section.items" class="card" (click)="playItem(item)">
        <img [src]="item.image_url" [alt]="item.title">
        <div class="card-title">{{ item.title }}</div>
        <div class="card-subtitle">{{ item.subtitle }}</div>
      </div>
    </div>
  </div>
</div>
